<!DOCTYPE html>
<html>
<head>
    <title>Good Morning</title>
    <style>
        body {
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #ffffff;
            font-size: 60px;
        }

        p {
            color: #ffffff;
            font-size: 24px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            background-color: orange;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkorange;
        }
    </style>
</head>
<body>

    <h1>☀️ Good Morning!</h1>

    <p>Have a wonderful day ahead.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage() {
            alert("Wishing you a happy and productive day!");
        }
    </script>

</body>
</html>
